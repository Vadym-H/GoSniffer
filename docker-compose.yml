services:
  gosniffer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gosniffer-dev
    network_mode: "host"   
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
    stdin_open: true
    tty: true
    environment:
      - CONFIG_PATH=/app/config/local.yaml
      - APP_PASSWORD=supersecret

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gosniffer-frontend-dev
    ports:
      - "3001:3000"
    depends_on:
      - gosniffer
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
      - ./frontend/.next:/app/.next
    stdin_open: true
    tty: true
    command: npm run dev

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-dev
    network_mode: "host"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

volumes:
  go-modules:
  prometheus-data:
